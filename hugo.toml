baseURL = 'https://take-ai-bite.com/'
languageCode = 'en-us'
title = 'Take AI Bite'
theme = 'PaperMod'
[pagination]
  pagerSize = 5

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = 'production'
  title = 'Take AI Bite'
  description = 'Take AI Bite: a framework for human-AI collaboration where the human stays in control, grows through the work, and retains every lesson learned. Powered by Deliberate Systematic Methodology (DSM).'
  keywords = ['DSM', 'AI Collaboration', 'Methodology', 'Principles', 'Human-AI']
  author = 'Alberto Diaz Durana'
  images = ['/logo.png']

  [params.label]
    text = 'Take AI Bite'
    icon = '/logo.png'
    iconHeight = 35
  DateFormat = 'January 2, 2006'
  defaultTheme = 'auto'
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableScrollToTop = false
  comments = false
  hideSummary = false
  showtoc = true
  tocopen = false

  [params.homeInfoParams]
    Title = 'Take AI Bite'
    Content = """**Take AI Bite** is a framework for human-AI collaboration where the human stays in control, grows through the work, and retains every lesson learned. Powered by **Deliberate Systematic Methodology (DSM)**.

When AI generates faster than you can review, oversight becomes rubber-stamping. You're in the room, but not in the loop. These are principles for structuring AI collaboration so every delivery is small enough to think about, sharp enough to act on, and real enough to earn genuine engagement, not just approval.

### The Eight Principles

1. **Take a Bite** -- Deliver only what the reviewer can chew
2. **The Human Brings the Spark** -- AI amplifies; the human provides direction, intuition, and judgment
3. **Earn Your Assertions** -- Investigate before you claim, verify before you act
4. **Critical Thinking** -- Question your own reasoning before asking others to trust it
5. **Know Your Context** -- Manage your own resource consumption
6. **Match the Room** -- Contribute proportionally to the project's culture and scale
7. **Own Your Process** -- Disclose how the work was produced
8. **Know What You Own** -- Verify licensing before deployment"""

  [[params.socialIcons]]
    name = 'github'
    url = 'https://github.com/albertodiazdurana/take-ai-bite'

  [[params.socialIcons]]
    name = 'linkedin'
    url = 'https://www.linkedin.com/in/albertodiazdurana'

  [[params.socialIcons]]
    name = 'rss'
    url = '/index.xml'

  [params.editPost]
    URL = 'https://github.com/albertodiazdurana/dsm-blog-poster/tree/main/content'
    Text = 'Suggest Changes'
    appendFilePath = true

[[menu.main]]
  identifier = 'blog'
  name = 'Blog'
  url = '/blog/'
  weight = 10

[[menu.main]]
  identifier = 'tags'
  name = 'Tags'
  url = '/tags/'
  weight = 20

[[menu.main]]
  identifier = 'archives'
  name = 'Archives'
  url = '/archives/'
  weight = 30

[[menu.main]]
  identifier = 'search'
  name = 'Search'
  url = '/search/'
  weight = 40

[outputs]
  home = ['HTML', 'RSS', 'JSON']

[markup]
  [markup.highlight]
    noClasses = false
