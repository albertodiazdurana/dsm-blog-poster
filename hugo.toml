baseURL = 'https://blog.take-ai-bite.com/'
languageCode = 'en-us'
title = 'Take AI Bite'
theme = 'PaperMod'
[pagination]
  pagerSize = 5

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = 'production'
  title = 'Take AI Bite'
  description = 'Deliberate Systematic Methodology (DSM): a practitioner-oriented framework for human-AI collaboration.'
  keywords = ['DSM', 'AI Collaboration', 'Methodology', 'Principles', 'Human-AI']
  author = 'Alberto Diaz Durana'
  images = ['/logo.png']

  [params.label]
    text = 'Take AI Bite'
    icon = '/logo.png'
    iconHeight = 35
  DateFormat = 'January 2, 2006'
  defaultTheme = 'auto'
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableScrollToTop = false
  comments = false
  hideSummary = false
  showtoc = true
  tocopen = false

  [params.homeInfoParams]
    Title = 'Take AI Bite'
    Content = 'Principles for keeping the human genuinely present in AI-assisted work. Not by slowing the AI down, but by structuring collaboration so that every delivery is sized for real engagement.'

  [[params.socialIcons]]
    name = 'github'
    url = 'https://github.com/albertodiazdurana/take-ai-bite'

  [[params.socialIcons]]
    name = 'linkedin'
    url = 'https://www.linkedin.com/in/albertodiazdurana'

  [[params.socialIcons]]
    name = 'rss'
    url = '/index.xml'

  [params.editPost]
    URL = 'https://github.com/albertodiazdurana/dsm-blog-poster/tree/main/content'
    Text = 'Suggest Changes'
    appendFilePath = true

[[menu.main]]
  identifier = 'blog'
  name = 'Blog'
  url = '/blog/'
  weight = 10

[[menu.main]]
  identifier = 'tags'
  name = 'Tags'
  url = '/tags/'
  weight = 20

[[menu.main]]
  identifier = 'archives'
  name = 'Archives'
  url = '/archives/'
  weight = 30

[[menu.main]]
  identifier = 'search'
  name = 'Search'
  url = '/search/'
  weight = 40

[outputs]
  home = ['HTML', 'RSS', 'JSON']

[markup]
  [markup.highlight]
    noClasses = false
