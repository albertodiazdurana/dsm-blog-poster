baseURL = 'https://takeaibite.de/'
languageCode = 'en-us'
title = 'TakeAIBite'
theme = 'PaperMod'
[pagination]
  pagerSize = 5

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = 'production'
  title = 'TakeAIBite'
  description = 'Data science, AI methodology, and software engineering -- by Alberto Diaz Durana'
  keywords = ['Data Science', 'AI', 'Methodology', 'Blog', 'Software Engineering']
  author = 'Alberto Diaz Durana'
  DateFormat = 'January 2, 2006'
  defaultTheme = 'auto'
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableScrollToTop = false
  comments = false
  hideSummary = false
  showtoc = true
  tocopen = false

  [params.homeInfoParams]
    Title = 'TakeAIBite'
    Content = 'Data science methodology, AI-assisted development, and lessons from building real projects.'

  [[params.socialIcons]]
    name = 'github'
    url = 'https://github.com/albertodiazdurana'

  [[params.socialIcons]]
    name = 'linkedin'
    url = 'https://www.linkedin.com/in/albertodiazdurana'

  [[params.socialIcons]]
    name = 'rss'
    url = '/index.xml'

  [params.editPost]
    URL = 'https://github.com/albertodiazdurana/dsm-blog-poster/tree/main/content'
    Text = 'Suggest Changes'
    appendFilePath = true

[[menu.main]]
  identifier = 'blog'
  name = 'Blog'
  url = '/blog/'
  weight = 10

[[menu.main]]
  identifier = 'tags'
  name = 'Tags'
  url = '/tags/'
  weight = 20

[[menu.main]]
  identifier = 'archives'
  name = 'Archives'
  url = '/archives/'
  weight = 30

[[menu.main]]
  identifier = 'search'
  name = 'Search'
  url = '/search/'
  weight = 40

[outputs]
  home = ['HTML', 'RSS', 'JSON']

[markup]
  [markup.highlight]
    noClasses = false
