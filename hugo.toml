baseURL = 'https://take-ai-bite.com/'
languageCode = 'en'
title = 'Take AI Bite'
theme = 'anatole'

summarylength = 25
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
enableEmoji = false

[pagination]
  pagerSize = 10

[taxonomies]
  category = "categories"
  tag = "tags"

[params]
  title = 'Take AI Bite'
  author = 'Alberto Diaz Durana'
  description = 'A framework for human-AI collaboration where the human stays in control, grows through the work, and retains every lesson learned.'
  profilePicture = 'images/profile.png'
  keywords = 'DSM, AI Collaboration, Methodology, Principles, Human-AI'
  favicon = 'favicons/'
  mainSections = ['blog']
  images = ['images/profile.png']
  doNotLoadAnimations = false
  singleDateFormat = '2 January 2006'
  indexDateFormat = '2 January 2006'
  listDateFormat = '2 January 2006'
  reversepagetitle = true
  readMore = true
  postSectionName = 'blog'

  [[params.socialIcons]]
    icon = 'fa-brands fa-github'
    title = 'GitHub'
    url = 'https://github.com/albertodiazdurana/take-ai-bite'

  [[params.socialIcons]]
    icon = 'fa-brands fa-linkedin'
    title = 'LinkedIn'
    url = 'https://www.linkedin.com/in/albertodiazdurana'

  [[params.socialIcons]]
    icon = 'fa-solid fa-rss'
    title = 'RSS'
    url = '/index.xml'

[[menu.main]]
  identifier = 'home'
  name = 'Home'
  url = '/'
  weight = 10

[[menu.main]]
  identifier = 'blog'
  name = 'Blog'
  url = '/blog/'
  weight = 20

[[menu.main]]
  identifier = 'about'
  name = 'About'
  url = '/about/'
  weight = 30

[[menu.main]]
  identifier = 'about-me'
  name = 'About Me'
  url = '/about-me/'
  weight = 35

[[menu.main]]
  identifier = 'tags'
  name = 'Tags'
  url = '/tags/'
  weight = 40

[outputs]
  home = ['HTML', 'RSS']

[markup]
  [markup.highlight]
    noClasses = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
